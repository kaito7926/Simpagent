services:
  postgres:
    image: postgres:18.4
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: simpagent
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d simpagent"]
      interval: 5s
      timeout: 5s
      retries: 20
    volumes:
      - postgres-data:/var/lib/postgresql
    networks:
      - private

  migrate:
    build:
      context: ./backend
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      SIMPAGENT_APP_ENV: development
      SIMPAGENT_DATABASE_URL: postgresql+psycopg://postgres:postgres@postgres:5432/simpagent
      SIMPAGENT_ALLOWED_ORIGINS: http://localhost:3000,http://localhost:8000
      SIMPAGENT_COOKIE_SECURE: false
      SIMPAGENT_COOKIE_SAMESITE: strict
      SIMPAGENT_DEMO_SEED_ENABLED: false
      SIMPAGENT_PROVIDER_CHECK_TIMEOUT_SECONDS: 2
    command: ["alembic", "upgrade", "head"]
    networks:
      - private

  init-dev-secrets:
    build:
      context: ./backend
    command: ["python", "-m", "app.cli.init_dev_secrets", "--secrets-dir", "/run/secrets"]
    volumes:
      - dev-secrets:/run/secrets
    networks:
      - private

  seed-demo:
    build:
      context: ./backend
    depends_on:
      postgres:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully
      init-dev-secrets:
        condition: service_completed_successfully
    environment:
      SIMPAGENT_APP_ENV: development
      SIMPAGENT_DATABASE_URL: postgresql+psycopg://postgres:postgres@postgres:5432/simpagent
      SIMPAGENT_ALLOWED_ORIGINS: http://localhost:3000,http://localhost:8000
      SIMPAGENT_DEMO_SEED_ENABLED: true
      SIMPAGENT_DEMO_USER_EMAIL: demo.user@simpagent.test
      SIMPAGENT_DEMO_USER_PASSWORD: ThayDoiMatKhauDemoUser123
      SIMPAGENT_DEMO_ADMIN_EMAIL: demo.admin@simpagent.test
      SIMPAGENT_DEMO_ADMIN_PASSWORD: ThayDoiMatKhauDemoAdmin123
    command: ["python", "-m", "app.cli.seed_demo"]
    volumes:
      - dev-secrets:/run/secrets
    networks:
      - private

  backend:
    build:
      context: ./backend
    depends_on:
      postgres:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully
      init-dev-secrets:
        condition: service_completed_successfully
      seed-demo:
        condition: service_completed_successfully
    environment:
      SIMPAGENT_APP_ENV: development
      SIMPAGENT_DATABASE_URL: postgresql+psycopg://postgres:postgres@postgres:5432/simpagent
      SIMPAGENT_ALLOWED_ORIGINS: http://localhost:3000,http://localhost:8000
      SIMPAGENT_JWT_ISSUER: simpagent.local
      SIMPAGENT_JWT_AUDIENCE: simpagent-api
      SIMPAGENT_JWT_ACTIVE_KID: test-kid
      SIMPAGENT_JWT_PRIVATE_KEY_FILE: /run/secrets/jwt_private_key
      SIMPAGENT_JWT_PUBLIC_KEY_FILE: /run/secrets/jwt_public_key
      SIMPAGENT_REFRESH_HMAC_KEY_FILE: /run/secrets/refresh_hmac_key
      SIMPAGENT_CSRF_HMAC_KEY_FILE: /run/secrets/csrf_hmac_key
      SIMPAGENT_COOKIE_SECURE: false
      SIMPAGENT_COOKIE_SAMESITE: strict
      SIMPAGENT_DEMO_SEED_ENABLED: true
      SIMPAGENT_DEMO_USER_EMAIL: demo.user@simpagent.test
      SIMPAGENT_DEMO_USER_PASSWORD: ThayDoiMatKhauDemoUser123
      SIMPAGENT_DEMO_ADMIN_EMAIL: demo.admin@simpagent.test
      SIMPAGENT_DEMO_ADMIN_PASSWORD: ThayDoiMatKhauDemoAdmin123
      SIMPAGENT_PROVIDER_CHECK_TIMEOUT_SECONDS: ${PROVIDER_CHECK_TIMEOUT_SECONDS:-2}
      SIMPAGENT_LLM_API_BASE: ${LLM_API_BASE:-https://api.example.test/v1}
      SIMPAGENT_LLM_API_KEY_FILE: ${LLM_API_KEY_FILE:-/run/secrets/llm_api_key}
      SIMPAGENT_LLM_MODEL: ${LLM_MODEL:-fake-model}
      SIMPAGENT_LLM_TIMEOUT_SECONDS: ${LLM_TIMEOUT_SECONDS:-30}
      SIMPAGENT_LLM_MAX_RETRIES: ${LLM_MAX_RETRIES:-1}
      SIMPAGENT_SEARCH_MODEL: ${SEARCH_MODEL:-configured-search-model}
    volumes:
      - dev-secrets:/run/secrets
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://localhost:8000/health"]
      interval: 10s
      timeout: 5s
      retries: 20
    networks:
      - private

  frontend:
    build:
      context: ./frontend
    environment:
      NEXT_TELEMETRY_DISABLED: 1
      SIMPAGENT_APP_ENV: development
      SIMPAGENT_DEMO_SEED_ENABLED: true
      SIMPAGENT_DEMO_USER_EMAIL: demo.user@simpagent.test
      SIMPAGENT_DEMO_USER_PASSWORD: ThayDoiMatKhauDemoUser123
      SIMPAGENT_DEMO_ADMIN_EMAIL: demo.admin@simpagent.test
      SIMPAGENT_DEMO_ADMIN_PASSWORD: ThayDoiMatKhauDemoAdmin123
    depends_on:
      backend:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "node", "-e", "fetch('http://127.0.0.1:3000').then(r => process.exit(r.ok ? 0 : 1)).catch(() => process.exit(1))"]
      interval: 10s
      timeout: 5s
      retries: 20
    networks:
      - private
      - public

  kong:
    image: kong:3.9.1
    depends_on:
      backend:
        condition: service_healthy
    environment:
      KONG_DATABASE: off
      KONG_DECLARATIVE_CONFIG: /etc/kong/kong.yml
      KONG_PROXY_LISTEN: 0.0.0.0:8000
      KONG_ADMIN_LISTEN: 127.0.0.1:8001
    volumes:
      - ./kong/kong.yml:/etc/kong/kong.yml:ro
    ports:
      - "8000:8000"
    networks:
      - private
      - public

  sandbox:
    build:
      context: ./sandbox
    networks:
      - private

volumes:
  postgres-data:
  dev-secrets:

networks:
  private:
    internal: true
  public:
