server:
  http_listen_port: 9080
  grpc_listen_port: 0

positions:
  filename: /tmp/positions.yaml

clients:
  - url: http://loki:3100/loki/api/v1/push

scrape_configs:
  - job_name: simpagent-backend
    static_configs:
      - targets:
          - localhost
        labels:
          job: simpagent-backend
          service: backend
          __path__: /var/log/simpagent/backend/*.log
    pipeline_stages:
      - json:
          expressions:
            timestamp: timestamp
            level: level
            logger: logger
            event: event
            correlation_id: correlation_id
            trace_id: trace_id
            span_id: span_id
            method: method
            path: path
            status_code: status_code
      - labels:
          level:
          logger:
          event:

  - job_name: simpagent-kong
    static_configs:
      - targets:
          - localhost
        labels:
          job: simpagent-kong
          service: kong
          __path__: /var/log/simpagent/kong/*.log
